reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      Lund University's strongest public API footprint is the Lund University
      Libraries' Lund University Publications (LUP) service, which documents and
      serves a JSON Search API, OAI-PMH, SRU/CQL, unAPI, and RSS feeds. The LUP
      Search API JSON endpoint, the OAI-PMH endpoint at /oai, and the SRU
      endpoint were all verified live (HTTP 200). The documented /search/oai and
      /search/sru paths returned 404, so the working base URLs were corrected to
      the /oai and /sru paths. The Research Portal (LUCRIS on Elsevier Pure)
      resolves and is documented as offering API/RSS retrieval, but its Pure web
      service OAI endpoint returned HTTP 500 and full public API access is not
      openly self-service, so it is cataloged as a documented-but-gated property
      rather than a confirmed open API. No fabricated endpoints; only
      live-verified or vendor-documented interfaces are listed.
    endpoints:
      - url: https://lup.lub.lu.se/search/publication?q=dna&format=json
        status: 200
        note: LUP Search API JSON, verified live.
      - url: https://lup.lub.lu.se/oai?verb=Identify
        status: 200
        note: LUP OAI-PMH endpoint, verified live (doc page lists /search/oai which 404s).
      - url: https://lup.lub.lu.se/sru?version=1.1&operation=searchRetrieve&query=dna&maximumRecords=1
        status: 200
        note: LUP SRU/CQL endpoint, verified live.
      - url: https://lup.lub.lu.se/search/oai?verb=Identify
        status: 404
        note: Documented OAI path no longer resolves; canonical is /oai.
      - url: https://lup.lub.lu.se/search/sru?version=1.1&operation=searchRetrieve&query=dna
        status: 404
        note: Documented SRU path no longer resolves; canonical is /sru.
      - url: https://lup.lub.lu.se/search/doc/api
        status: 200
